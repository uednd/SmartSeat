name: smartseat

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '${SMARTSEAT_POSTGRES_PORT:-5432}:5432'
    volumes:
      - smartseat-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -h 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '${SMARTSEAT_MQTT_PORT:-1883}:1883'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_pub -h 127.0.0.1 -p 1883 -t smartseat/healthcheck -m ping']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  api-db-init:
    image: ${SMARTSEAT_API_IMAGE:-smartseat-api:local}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: 'no'
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST is required}
      MQTT_PORT: ${MQTT_PORT:?MQTT_PORT is required}
      MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      WECHAT_APP_ID: ${WECHAT_APP_ID:?WECHAT_APP_ID is required}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?WECHAT_APP_SECRET is required}
      WECHAT_AUTH_PROVIDER_MODE: ${WECHAT_AUTH_PROVIDER_MODE:?WECHAT_AUTH_PROVIDER_MODE is required}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID is required}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET is required}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:?OIDC_REDIRECT_URI is required}
      OIDC_AUTH_PROVIDER_MODE: ${OIDC_AUTH_PROVIDER_MODE:?OIDC_AUTH_PROVIDER_MODE is required}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:?AUTH_TOKEN_TTL_SECONDS is required}
      DEFAULT_AUTH_MODE: ${DEFAULT_AUTH_MODE:?DEFAULT_AUTH_MODE is required}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        'sh',
        '-lc',
        'pnpm --filter @smartseat/api db:migrate && pnpm --filter @smartseat/api db:seed'
      ]

  api:
    image: ${SMARTSEAT_API_IMAGE:-smartseat-api:local}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST is required}
      MQTT_PORT: ${MQTT_PORT:?MQTT_PORT is required}
      MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      WECHAT_APP_ID: ${WECHAT_APP_ID:?WECHAT_APP_ID is required}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?WECHAT_APP_SECRET is required}
      WECHAT_AUTH_PROVIDER_MODE: ${WECHAT_AUTH_PROVIDER_MODE:?WECHAT_AUTH_PROVIDER_MODE is required}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID is required}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET is required}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:?OIDC_REDIRECT_URI is required}
      OIDC_AUTH_PROVIDER_MODE: ${OIDC_AUTH_PROVIDER_MODE:?OIDC_AUTH_PROVIDER_MODE is required}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:?AUTH_TOKEN_TTL_SECONDS is required}
      DEFAULT_AUTH_MODE: ${DEFAULT_AUTH_MODE:?DEFAULT_AUTH_MODE is required}
    ports:
      - '${SMARTSEAT_API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      api-db-init:
        condition: service_completed_successfully

volumes:
  smartseat-postgres-data:
